<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Land Cover Classification</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f5f7fa;
      --surface:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --accent:#2563eb;
      --border:#e5e7eb;
      --shadow:0 10px 28px rgba(0,0,0,0.06);
      --radius:20px;
      --max-width:1100px;
    }

    *{ margin:0; padding:0; box-sizing:border-box; }
    body{ font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); line-height:1.7; padding:2rem 0; }
    .container{ width:min(92%, var(--max-width)); margin:auto; }

    .back-btn { display:inline-flex; align-items:center; gap:0.5rem; color:var(--muted); font-weight:500; text-decoration:none; margin-bottom:2rem; transition:0.2s; }
    .back-btn:hover { color:var(--accent); }

    header { margin-bottom:2.5rem; }
    header h1 { font-family:'Merriweather',serif; font-size:clamp(1.8rem, 4vw, 2.8rem); margin-bottom:0.5rem; line-height:1.2; color:#1f2937; }
    header p { color:var(--muted); font-size:1.1rem; }

    /* Clean Card Container Matching Kindergarten Page */
    .showcase-card { 
      background:var(--surface); 
      border:1px solid var(--border); 
      border-radius:var(--radius); 
      box-shadow:var(--shadow); 
      padding:2.5rem; 
      margin-bottom:2.5rem;
    }
    
    .card-title {
      font-family:'Merriweather',serif;
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 2rem;
      color: var(--text);
    }

    /* Grid layout for images */
    .map-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    @media(max-width: 768px) {
      .map-grid { grid-template-columns: 1fr; }
    }

    .map-item {
      display: flex;
      flex-direction: column;
    }

    .image-container { 
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 1rem;
    }

    .image-container img { 
      width: 100%; 
      height: auto; 
      display: block;
      cursor: pointer;
    }
    
    .map-meta { color: var(--muted); font-size: 0.9rem; margin-top: 0.25rem; }
    
    .description-text { color:#4b5563; font-size:1.05rem; margin-top: 0.5rem; }
  </style>
</head>
<body>

  <div class="container">
    <a href="index.html" class="back-btn">← Back to Portfolio</a>

    <header>
      <h1>Land Cover Classification</h1>
      <p>A map looking at the different classes of land usage in Barcelona.</p>
    </header>

    <main>
          <div class="map-item">
            <h3>Barcelona's land cover usage</h3>
            <div class="image-container">
              <img src="landcovermap.jpg" alt="image7">
            </div>
            <div class="map-meta">
              <strong>Software:</strong> ArcGIS
            </div>
          </div>
          <div class="description-text">
            <p>description...</p>
          </div>
        </div>

    </main>

    <footer style="margin-top: 4rem; text-align: center; color: var(--muted); font-size: 0.9rem;">
      © 2026 UCU GIS Student Portfolio
    </footer>
  </div>

</body>
</html>
